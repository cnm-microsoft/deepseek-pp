name: Build & Package

# 触发条件
于:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. TypeScript 类型检查 (可选)
      - name: Type check
        run: npm run compile
        continue-on-error: true

      # 5. 构建扩展
      - name: Build extension
        run: npm run build

      # 6. 打包为 zip
      - name: Package as zip
        run: npm run zip

      # 7. 上传构建产物
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-pp-node-${{ matrix.node-version }}
          path: |
            dist/
            .output/**/*.zip
          retention-days: 30
