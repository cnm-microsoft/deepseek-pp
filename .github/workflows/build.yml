name: Build & Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 消除 actions 的 Node 20 弃用警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      matrix:
        # 只保留满足引擎要求的版本
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 安装 Chrome 类型定义（修复所有 "Cannot find name 'chrome'" 错误）
      - name: Install Chrome types
        run: npm install --save-dev @types/chrome

      - name: Type check
        run: npm run compile
        continue-on-error: true   # 先不阻断，如果有其他类型错误可稍后修复

      - name: Build extension
        run: npm run build

      - name: Package as zip
        run: npm run zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-pp
          path: |
            dist/
            .output/**/*.zip
          retention-days: 30
